{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container py-5">
<form action="{% url 'updateDataView' note.id %}" method="post" class="container mx-auto card p-4">
    {% csrf_token %}

    <div class="mb-3">
        <label for="title">Note Title</label>
        <input 
            name="title"
            value="{{ note.title }}"
            type="text" 
            id="title" 
            class="form-control" 
            placeholder="Enter Note Title">
    </div>

    <div class="mb-3">
        <label for="desc">Note Description</label>
        <textarea 
            name="description"
            rows="5" 
            id="desc" 
            class="form-control">{{ note.description }}</textarea>
    </div>

    <div class="mb-3">
        <button style="width: 100%;" class="btn btn-primary">
            Save
        </button>
    </div>

</form>
</div>
{% endblock %}
